<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05051a"/>
      <stop offset="50%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#05051a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="orb1" cx="30%" cy="40%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="70%" cy="60%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Grid lines for cyberpunk feel -->
  <g opacity="0.03" stroke="#00f0ff">
    <line x1="0" y1="100" x2="1200" y2="100" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke-width="1"/>
  </g>

  <!-- Brain emoji glow -->
  <circle cx="600" cy="200" r="80" fill="#00f0ff" opacity="0.06" filter="url(#bigGlow)"/>

  <!-- Brain emoji -->
  <text x="600" y="225" text-anchor="middle" font-size="120" filter="url(#glow)">🧠</text>

  <!-- Main title EN -->
  <text x="600" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="56" fill="url(#cyan)" filter="url(#glow)">
    AI Brain Match
  </text>

  <!-- Subtitle ZH -->
  <text x="600" y="395" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-weight="700" font-size="30" fill="rgba(255,255,255,0.6)">
    测测你是哪款AI
  </text>

  <!-- Description -->
  <text x="600" y="445" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="18" fill="rgba(255,255,255,0.3)">
    20 questions · 7 categories · 6 specialties · GPT-2 to GPT-5
  </text>

  <!-- AI model chips -->
  <g font-family="Inter, sans-serif" font-size="14" font-weight="600">
    <rect x="200" y="480" width="100" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(0,240,255,0.2)" stroke-width="1"/>
    <text x="250" y="501" text-anchor="middle" fill="rgba(0,240,255,0.7)">🤖 GPT-2</text>

    <rect x="320" y="480" width="120" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
    <text x="380" y="501" text-anchor="middle" fill="rgba(168,85,247,0.7)">🧪 Claude</text>

    <rect x="460" y="480" width="120" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(0,240,255,0.2)" stroke-width="1"/>
    <text x="520" y="501" text-anchor="middle" fill="rgba(0,240,255,0.7)">🔬 Gemini</text>

    <rect x="600" y="480" width="130" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
    <text x="665" y="501" text-anchor="middle" fill="rgba(168,85,247,0.7)">🧠 DeepSeek</text>

    <rect x="750" y="480" width="110" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(250,204,21,0.2)" stroke-width="1"/>
    <text x="805" y="501" text-anchor="middle" fill="rgba(250,204,21,0.7)">👑 GPT-5</text>

    <rect x="880" y="480" width="120" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(0,240,255,0.2)" stroke-width="1"/>
    <text x="940" y="501" text-anchor="middle" fill="rgba(0,240,255,0.7)">🚀 Opus</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="607" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500" font-size="16" fill="rgba(255,255,255,0.25)" letter-spacing="3">
    brain.openvibelab.com · Day 3 of 100 · OpenVibeLab
  </text>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="rgba(0,240,255,0.08)" stroke-width="2"/>
</svg>
